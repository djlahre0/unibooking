name: Unpublish (one-off)

# Manual, one-off helper to unpublish a single version from npm using NPM_TOKEN
# (which bypasses 2FA). Removed from the repo after use.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact version to unpublish (e.g. 0.1.0)'
        required: true

permissions:
  contents: read

jobs:
  unpublish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Unpublish the given version
        # Input passed via env (not inlined into the script) to avoid injection.
        env:
          VERSION: ${{ inputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm unpublish "unibooking@${VERSION}"
