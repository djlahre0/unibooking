name: Publish to npm

# Publishes the package whenever a GitHub Release is published, or on manual
# dispatch. The version that ships is whatever is in package.json — npm rejects
# re-publishing an existing version, so bump + tag + release for each release.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      # `prepublishOnly` runs typecheck + lint + tests + build before packing,
      # so a broken release never reaches the registry.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
