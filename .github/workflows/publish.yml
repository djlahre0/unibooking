name: Publish to npm

# Publishes the package whenever a GitHub Release is published, or on manual
# dispatch. The version that ships is whatever is in package.json — npm rejects
# re-publishing an existing version, so bump + tag + release for each release.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to a full commit SHA (not a mutable tag) so a
      # moved/compromised tag can't inject code into a job that holds NPM_TOKEN
      # and id-token. `persist-credentials: false` drops the GITHUB_TOKEN we
      # never use (this job only reads and publishes to npm, it doesn't push).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      # Publish only when package.json's version isn't already on the registry, so
      # re-running (or re-triggering a release) is idempotent instead of failing.
      # `prepublishOnly` runs typecheck + lint + tests + build before packing, so a
      # broken release never reaches the registry.
      - name: Publish to npm (skip if version already published)
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "unibooking@${VERSION}" version >/dev/null 2>&1; then
            echo "unibooking@${VERSION} is already published — skipping."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
